workflows:
  react-native-ios-release:
    name: React Native iOS Release Build (No Signing - Simulator)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "LocalOSApp.xcworkspace"
        XCODE_SCHEME: "LocalOSApp"
      node: 20.11.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          bundle install
          bundle exec pod install
      - name: Build iOS Release for Simulator
        script: |
          cd ios
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build
      - name: Create Release App Archive
        script: |
          cd ios
          mkdir -p ../artifacts
          cp -R build/Build/Products/Release-iphonesimulator/LocalOSApp.app ../artifacts/
          cd ../artifacts
          zip -r LocalOSApp-Release.app.zip LocalOSApp.app
    artifacts:
      - artifacts/*.zip
      - ios/build/Build/Products/Release-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  react-native-android-release:
    name: React Native Android Release Build (No Signing)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        PACKAGE_NAME: "com.localosapp"
      node: 20.11.0
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build Android Release APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
