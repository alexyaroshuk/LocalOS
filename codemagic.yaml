workflows:
  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.localosapp
      vars:
        # Xcode version
        XCODE_WORKSPACE: "LocalOSApp.xcworkspace"
        XCODE_SCHEME: "LocalOSApp"
        # Bundle ID
        BUNDLE_ID: "com.localosapp"
      node: 20.11.0
      xcode: 15.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          bundle install
          bundle exec pod install
          cd ..
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace ios/$XCODE_WORKSPACE \
            --scheme $XCODE_SCHEME
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      app_store_connect:
        # Configuration for App Store Connect
        auth: integration
        # Submit to TestFlight
        submit_to_testflight: true
        # Submit to App Store
        submit_to_app_store: false

  react-native-android:
    name: React Native Android Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      android_signing:
        - keystore_reference
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.localosapp"
      node: 20.11.0
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
      - name: Build Android App Bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  # Development builds (no signing required)
  react-native-dev:
    name: React Native Development Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20.11.0
      xcode: 15.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Run linter
        script: |
          npm run lint
      - name: Install iOS pods
        script: |
          cd ios
          bundle install
          bundle exec pod install
          cd ..
      - name: Build iOS (Debug)
        script: |
          cd ios
          xcodebuild -workspace LocalOSApp.xcworkspace \
            -scheme LocalOSApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build
          cd ..
    artifacts:
      - ios/build/**/*.app
