workflows:
  react-native-ios-debug:
    name: React Native iOS Debug Build (No Signing)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "LocalOSApp.xcworkspace"
        XCODE_SCHEME: "LocalOSApp"
      node: 20.11.0
      xcode: 15.2
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          cd LocalOSApp
          npm install
      - name: Install CocoaPods dependencies
        script: |
          cd LocalOSApp/ios
          bundle install
          bundle exec pod install
      - name: Build iOS Debug (Simulator)
        script: |
          cd LocalOSApp/ios
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            clean build
      - name: Create Debug App Archive
        script: |
          cd LocalOSApp/ios
          mkdir -p ../../artifacts
          cp -R build/Build/Products/Debug-iphonesimulator/LocalOSApp.app ../../artifacts/
          cd ../../artifacts
          zip -r LocalOSApp-Debug.app.zip LocalOSApp.app
    artifacts:
      - artifacts/*.zip
      - LocalOSApp/ios/build/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  react-native-android-debug:
    name: React Native Android Debug Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        PACKAGE_NAME: "com.localosapp"
      node: 20.11.0
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          cd LocalOSApp
          npm install
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/LocalOSApp/android/local.properties"
      - name: Build Android Debug APK
        script: |
          cd LocalOSApp/android
          ./gradlew assembleDebug
    artifacts:
      - LocalOSApp/android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
