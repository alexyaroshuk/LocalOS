workflows:
  react-native-ios-debug:
    name: React Native iOS Debug Build (No Signing)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "LocalOSApp.xcworkspace"
        XCODE_SCHEME: "LocalOSApp"
      node: 20.11.0
      xcode: 16.1
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          bundle install
          bundle exec pod install
      - name: Build iOS Debug (Simulator)
        script: |
          cd ios
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            clean build
      - name: Create Debug App Archive
        script: |
          cd ios
          mkdir -p ../artifacts
          cp -R build/Build/Products/Debug-iphonesimulator/*.app ../artifacts/ || true
          cd ../artifacts
          zip -r LocalOS-Debug.app.zip *.app
    artifacts:
      - artifacts/*.zip
      - ios/build/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  react-native-android-debug:
    name: React Native Android Debug Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        PACKAGE_NAME: "com.localosapp"
      node: 20.11.0
      xcode: 16.1
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
